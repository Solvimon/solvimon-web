name: CI

on:
    pull_request:

jobs:
    install:
        name: Install
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4

            - uses: actions/setup-node@v4
              with:
                  node-version-file: package.json
                  cache: npm

            - name: Authenticate GitLab npm registry
              run: npm config set //gitlab.com/api/v4/projects/38958827/packages/npm/:_authToken ${{ secrets.GITLAB_NPM_TOKEN }}

            - name: Install dependencies
              run: npm ci
              env:
                  GITLAB_NPM_TOKEN: ${{ secrets.GITLAB_NPM_TOKEN }}

            - uses: actions/cache/save@v4
              with:
                  path: node_modules
                  key: ${{ runner.os }}-node-modules-${{ hashFiles('package-lock.json') }}

    test:
        name: Unit Tests
        needs: install
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4
            - uses: actions/setup-node@v4
              with:
                  node-version-file: package.json
            - uses: actions/cache/restore@v4
              with:
                  path: node_modules
                  key: ${{ runner.os }}-node-modules-${{ hashFiles('package-lock.json') }}
            - run: npm run test:unit -- --run

    coverage:
        name: Coverage
        needs: install
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4
            - uses: actions/setup-node@v4
              with:
                  node-version-file: package.json
            - uses: actions/cache/restore@v4
              with:
                  path: node_modules
                  key: ${{ runner.os }}-node-modules-${{ hashFiles('package-lock.json') }}
            - run: npm run test:coverage
            - uses: actions/upload-artifact@v4
              with:
                  name: coverage-summary
                  path: coverage/coverage-summary.json

    coverage-report:
        name: Coverage Report
        needs: coverage
        runs-on: ubuntu-latest
        permissions:
            pull-requests: write
        steps:
            - uses: actions/checkout@v4
            - uses: actions/setup-node@v4
              with:
                  node-version-file: package.json
            - uses: actions/cache/restore@v4
              with:
                  path: node_modules
                  key: ${{ runner.os }}-node-modules-${{ hashFiles('package-lock.json') }}
            - name: Download PR coverage
              uses: actions/download-artifact@v4
              with:
                  name: coverage-summary
                  path: /tmp/pr
            - name: Preserve coverage report script
              run: cp scripts/ci/coverage-report.mjs /tmp/coverage-report.mjs
            - name: Authenticate GitLab npm registry
              run: npm config set //gitlab.com/api/v4/projects/38958827/packages/npm/:_authToken ${{ secrets.GITLAB_NPM_TOKEN }}
            - name: Checkout base branch
              uses: actions/checkout@v4
              with:
                  ref: ${{ github.base_ref }}
                  clean: false
            - name: Run base coverage
              run: npm run test:coverage
              continue-on-error: true
            - name: Generate coverage report
              run: |
                  node /tmp/coverage-report.mjs \
                      --pr /tmp/pr/coverage-summary.json \
                      --base coverage/coverage-summary.json \
                      --sha ${{ github.sha }} \
                      --base-ref ${{ github.base_ref }} \
                      > /tmp/coverage-report.md
            - name: Post coverage comment
              uses: actions/github-script@v7
              with:
                  script: |
                      const body = require('fs').readFileSync('/tmp/coverage-report.md', 'utf8');

                      const { data: comments } = await github.rest.issues.listComments({
                          owner: context.repo.owner,
                          repo: context.repo.repo,
                          issue_number: context.issue.number,
                      });

                      const existing = comments.find(c => c.body.includes('<!-- coverage-report -->'));
                      if (existing) {
                          await github.rest.issues.updateComment({
                              owner: context.repo.owner,
                              repo: context.repo.repo,
                              comment_id: existing.id,
                              body,
                          });
                      } else {
                          await github.rest.issues.createComment({
                              owner: context.repo.owner,
                              repo: context.repo.repo,
                              issue_number: context.issue.number,
                              body,
                          });
                      }

    type-check:
        name: Type Check
        needs: install
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4
            - uses: actions/setup-node@v4
              with:
                  node-version-file: package.json
            - uses: actions/cache/restore@v4
              with:
                  path: node_modules
                  key: ${{ runner.os }}-node-modules-${{ hashFiles('package-lock.json') }}
            - run: npm run type-check

    lint:
        name: Lint
        needs: install
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4
            - uses: actions/setup-node@v4
              with:
                  node-version-file: package.json
            - uses: actions/cache/restore@v4
              with:
                  path: node_modules
                  key: ${{ runner.os }}-node-modules-${{ hashFiles('package-lock.json') }}
            - run: npm run lint:ci

    build:
        name: Build
        needs: install
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4
            - uses: actions/setup-node@v4
              with:
                  node-version-file: package.json
            - uses: actions/cache/restore@v4
              with:
                  path: node_modules
                  key: ${{ runner.os }}-node-modules-${{ hashFiles('package-lock.json') }}
            - run: npm run build
            - name: Measure bundle
              run: node scripts/ci/measure-bundle.mjs > bundle-sizes.json
            - uses: actions/upload-artifact@v4
              with:
                  name: bundle-sizes
                  path: bundle-sizes.json

    translations-report:
        name: Translation Coverage Report
        needs: install
        runs-on: ubuntu-latest
        permissions:
            pull-requests: write
        steps:
            - uses: actions/checkout@v4
            - uses: actions/setup-node@v4
              with:
                  node-version-file: package.json
            - uses: actions/cache/restore@v4
              with:
                  path: node_modules
                  key: ${{ runner.os }}-node-modules-${{ hashFiles('package-lock.json') }}
            - name: Extract translations
              run: npm run translations:extract
            - name: Generate translations report
              run: |
                  node scripts/ci/translations-report.mjs \
                      --translations-dir src/translations \
                      --sha ${{ github.sha }} \
                      > /tmp/translations-report.md
            - name: Post translations comment
              uses: actions/github-script@v7
              with:
                  script: |
                      const body = require('fs').readFileSync('/tmp/translations-report.md', 'utf8');

                      const { data: comments } = await github.rest.issues.listComments({
                          owner: context.repo.owner,
                          repo: context.repo.repo,
                          issue_number: context.issue.number,
                      });

                      const existing = comments.find(c => c.body.includes('<!-- translations-report -->'));
                      if (existing) {
                          await github.rest.issues.updateComment({
                              owner: context.repo.owner,
                              repo: context.repo.repo,
                              comment_id: existing.id,
                              body,
                          });
                      } else {
                          await github.rest.issues.createComment({
                              owner: context.repo.owner,
                              repo: context.repo.repo,
                              issue_number: context.issue.number,
                              body,
                          });
                      }
            - name: Fail on missing translations
              run: npm run translations:check

    bundle-size:
        name: Bundle Size
        needs: build
        runs-on: ubuntu-latest
        permissions:
            pull-requests: write
        steps:
            - uses: actions/checkout@v4

            - uses: actions/setup-node@v4
              with:
                  node-version-file: package.json

            - uses: actions/cache/restore@v4
              with:
                  path: node_modules
                  key: ${{ runner.os }}-node-modules-${{ hashFiles('package-lock.json') }}

            - name: Download PR bundle sizes
              uses: actions/download-artifact@v4
              with:
                  name: bundle-sizes
                  path: /tmp/pr

            - name: Preserve CI scripts
              run: cp scripts/ci/measure-bundle.mjs scripts/ci/bundle-size-report.mjs /tmp/

            - name: Checkout base branch
              uses: actions/checkout@v4
              with:
                  ref: ${{ github.base_ref }}
                  clean: false

            - name: Build base branch
              run: rm -rf dist && npm run build

            - name: Measure base bundle
              run: node /tmp/measure-bundle.mjs > /tmp/base-bundle.json

            - name: Generate bundle size report
              run: |
                  node /tmp/bundle-size-report.mjs \
                      --pr /tmp/pr/bundle-sizes.json \
                      --base /tmp/base-bundle.json \
                      --sha ${{ github.sha }} \
                      --base-ref ${{ github.base_ref }} \
                      > /tmp/bundle-size-report.md

            - name: Post bundle size comment
              uses: actions/github-script@v7
              with:
                  script: |
                      const body = require('fs').readFileSync('/tmp/bundle-size-report.md', 'utf8');

                      const { data: comments } = await github.rest.issues.listComments({
                          owner: context.repo.owner,
                          repo: context.repo.repo,
                          issue_number: context.issue.number,
                      });

                      const existing = comments.find(c => c.body.includes('<!-- bundle-size-report -->'));
                      if (existing) {
                          await github.rest.issues.updateComment({
                              owner: context.repo.owner,
                              repo: context.repo.repo,
                              comment_id: existing.id,
                              body,
                          });
                      } else {
                          await github.rest.issues.createComment({
                              owner: context.repo.owner,
                              repo: context.repo.repo,
                              issue_number: context.issue.number,
                              body,
                          });
                      }
