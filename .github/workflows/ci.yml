name: CI

on:
    pull_request:

jobs:
    install:
        name: Install
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4

            - uses: actions/setup-node@v4
              with:
                  node-version-file: package.json
                  cache: npm

            - name: Authenticate GitLab npm registry
              run: npm config set //gitlab.com/api/v4/projects/38958827/packages/npm/:_authToken ${{ secrets.GITLAB_NPM_TOKEN }}

            - name: Install dependencies
              run: npm ci
              env:
                  GITLAB_NPM_TOKEN: ${{ secrets.GITLAB_NPM_TOKEN }}

            - uses: actions/cache/save@v4
              with:
                  path: node_modules
                  key: ${{ runner.os }}-node-modules-${{ hashFiles('package-lock.json') }}

    test:
        name: Unit Tests
        needs: install
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4
            - uses: actions/setup-node@v4
              with:
                  node-version-file: package.json
            - uses: actions/cache/restore@v4
              with:
                  path: node_modules
                  key: ${{ runner.os }}-node-modules-${{ hashFiles('package-lock.json') }}
            - run: npm run test:unit -- --run

    type-check:
        name: Type Check
        needs: install
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4
            - uses: actions/setup-node@v4
              with:
                  node-version-file: package.json
            - uses: actions/cache/restore@v4
              with:
                  path: node_modules
                  key: ${{ runner.os }}-node-modules-${{ hashFiles('package-lock.json') }}
            - run: npm run type-check

    lint:
        name: Lint
        needs: install
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4
            - uses: actions/setup-node@v4
              with:
                  node-version-file: package.json
            - uses: actions/cache/restore@v4
              with:
                  path: node_modules
                  key: ${{ runner.os }}-node-modules-${{ hashFiles('package-lock.json') }}
            - run: npm run lint:ci

    build:
        name: Build
        needs: install
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4
            - uses: actions/setup-node@v4
              with:
                  node-version-file: package.json
            - uses: actions/cache/restore@v4
              with:
                  path: node_modules
                  key: ${{ runner.os }}-node-modules-${{ hashFiles('package-lock.json') }}
            - run: npm run build
