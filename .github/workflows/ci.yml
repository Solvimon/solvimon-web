name: CI

on:
    pull_request:

jobs:
    install:
        name: Install
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4

            - uses: actions/setup-node@v4
              with:
                  node-version-file: package.json
                  cache: npm

            - name: Authenticate GitLab npm registry
              run: npm config set //gitlab.com/api/v4/projects/38958827/packages/npm/:_authToken ${{ secrets.GITLAB_NPM_TOKEN }}

            - name: Install dependencies
              run: npm ci
              env:
                  GITLAB_NPM_TOKEN: ${{ secrets.GITLAB_NPM_TOKEN }}

            - uses: actions/cache/save@v4
              with:
                  path: node_modules
                  key: ${{ runner.os }}-node-modules-${{ hashFiles('package-lock.json') }}

    test:
        name: Unit Tests
        needs: install
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4
            - uses: actions/setup-node@v4
              with:
                  node-version-file: package.json
            - uses: actions/cache/restore@v4
              with:
                  path: node_modules
                  key: ${{ runner.os }}-node-modules-${{ hashFiles('package-lock.json') }}
            - run: npm run test:unit -- --run

    coverage:
        name: Coverage
        needs: install
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4
            - uses: actions/setup-node@v4
              with:
                  node-version-file: package.json
            - uses: actions/cache/restore@v4
              with:
                  path: node_modules
                  key: ${{ runner.os }}-node-modules-${{ hashFiles('package-lock.json') }}
            - run: npm run test:coverage
            - uses: actions/upload-artifact@v4
              with:
                  name: coverage-summary
                  path: coverage/coverage-summary.json

    coverage-report:
        name: Coverage Report
        needs: coverage
        runs-on: ubuntu-latest
        permissions:
            pull-requests: write
        steps:
            - uses: actions/checkout@v4
            - uses: actions/setup-node@v4
              with:
                  node-version-file: package.json
            - uses: actions/cache/restore@v4
              with:
                  path: node_modules
                  key: ${{ runner.os }}-node-modules-${{ hashFiles('package-lock.json') }}
            - name: Download PR coverage
              uses: actions/download-artifact@v4
              with:
                  name: coverage-summary
                  path: /tmp/pr
            - name: Authenticate GitLab npm registry
              run: npm config set //gitlab.com/api/v4/projects/38958827/packages/npm/:_authToken ${{ secrets.GITLAB_NPM_TOKEN }}
            - name: Checkout base branch
              uses: actions/checkout@v4
              with:
                  ref: ${{ github.base_ref }}
                  clean: false
            - name: Run base coverage
              run: npm run test:coverage
              continue-on-error: true
            - name: Generate coverage report
              run: |
                  node scripts/ci/coverage-report.mjs \
                      --pr /tmp/pr/coverage-summary.json \
                      --base coverage/coverage-summary.json \
                      --sha ${{ github.sha }} \
                      --base-ref ${{ github.base_ref }} \
                      > /tmp/coverage-report.md
            - name: Post coverage comment
              uses: actions/github-script@v7
              with:
                  script: |
                      const body = require('fs').readFileSync('/tmp/coverage-report.md', 'utf8');

                      const { data: comments } = await github.rest.issues.listComments({
                          owner: context.repo.owner,
                          repo: context.repo.repo,
                          issue_number: context.issue.number,
                      });

                      const existing = comments.find(c => c.body.includes('<!-- coverage-report -->'));
                      if (existing) {
                          await github.rest.issues.updateComment({
                              owner: context.repo.owner,
                              repo: context.repo.repo,
                              comment_id: existing.id,
                              body,
                          });
                      } else {
                          await github.rest.issues.createComment({
                              owner: context.repo.owner,
                              repo: context.repo.repo,
                              issue_number: context.issue.number,
                              body,
                          });
                      }

    type-check:
        name: Type Check
        needs: install
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4
            - uses: actions/setup-node@v4
              with:
                  node-version-file: package.json
            - uses: actions/cache/restore@v4
              with:
                  path: node_modules
                  key: ${{ runner.os }}-node-modules-${{ hashFiles('package-lock.json') }}
            - run: npm run type-check

    lint:
        name: Lint
        needs: install
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4
            - uses: actions/setup-node@v4
              with:
                  node-version-file: package.json
            - uses: actions/cache/restore@v4
              with:
                  path: node_modules
                  key: ${{ runner.os }}-node-modules-${{ hashFiles('package-lock.json') }}
            - run: npm run lint:ci

    build:
        name: Build
        needs: install
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4
            - uses: actions/setup-node@v4
              with:
                  node-version-file: package.json
            - uses: actions/cache/restore@v4
              with:
                  path: node_modules
                  key: ${{ runner.os }}-node-modules-${{ hashFiles('package-lock.json') }}
            - run: npm run build
            - name: Measure bundle
              run: node scripts/ci/measure-bundle.mjs > bundle-sizes.json
            - uses: actions/upload-artifact@v4
              with:
                  name: bundle-sizes
                  path: bundle-sizes.json

    bundle-size:
        name: Bundle Size
        needs: build
        runs-on: ubuntu-latest
        permissions:
            pull-requests: write
        steps:
            - uses: actions/checkout@v4

            - uses: actions/setup-node@v4
              with:
                  node-version-file: package.json

            - uses: actions/cache/restore@v4
              with:
                  path: node_modules
                  key: ${{ runner.os }}-node-modules-${{ hashFiles('package-lock.json') }}

            - name: Download PR bundle sizes
              uses: actions/download-artifact@v4
              with:
                  name: bundle-sizes
                  path: /tmp/pr

            - name: Preserve measurement script
              run: cp scripts/ci/measure-bundle.mjs /tmp/measure-bundle.mjs

            - name: Checkout base branch
              uses: actions/checkout@v4
              with:
                  ref: ${{ github.base_ref }}
                  clean: false

            - name: Build base branch
              run: rm -rf dist && npm run build

            - name: Measure base bundle
              run: node /tmp/measure-bundle.mjs > /tmp/base-bundle.json

            - name: Post bundle size comment
              uses: actions/github-script@v7
              with:
                  script: |
                      const fs = require('fs');
                      const pr = JSON.parse(fs.readFileSync('/tmp/pr/bundle-sizes.json', 'utf8'));
                      const base = JSON.parse(fs.readFileSync('/tmp/base-bundle.json', 'utf8'));

                      function fmt(bytes) {
                          if (bytes >= 1024 * 1024) return (bytes / 1024 / 1024).toFixed(2) + ' MB';
                          if (bytes >= 1024) return (bytes / 1024).toFixed(1) + ' KB';
                          return bytes + ' B';
                      }

                      function dot(prSize, baseSize) {
                          const diff = prSize - baseSize;
                          if (diff > 0) return '🔴';
                          if (diff < 0) return '🟢';
                          return '⚪';
                      }

                      function delta(prSize, baseSize) {
                          const diff = prSize - baseSize;
                          if (diff === 0) return '–';
                          const pct = baseSize > 0 ? (Math.abs(diff / baseSize) * 100).toFixed(1) : '∞';
                          const sign = diff > 0 ? '+' : '−';
                          return `${sign}${fmt(Math.abs(diff))} (${sign}${pct}%)`;
                      }

                      const allKeys = [...new Set([...Object.keys(base.entries), ...Object.keys(pr.entries)])].sort();
                      const rows = allKeys.map(key => {
                          const b = base.entries[key] ?? 0;
                          const p = pr.entries[key] ?? 0;
                          return `| ${dot(p, b)} | \`${key}\` | ${fmt(b)} | ${fmt(p)} | ${delta(p, b)} |`;
                      });

                      const sha = '${{ github.sha }}'.slice(0, 7);
                      const baseRef = '${{ github.base_ref }}';

                      const totalDiff = pr.total - base.total;
                      const totalPct = base.total > 0 ? (Math.abs(totalDiff / base.total) * 100).toFixed(1) : '0.0';
                      const totalSign = totalDiff > 0 ? '+' : '−';
                      const totalSizeText = `**${fmt(Math.abs(totalDiff))} (${totalSign}${totalPct}%)**`;
                      const verb = totalDiff > 0 ? '**increased**' : '**decreased**';
                      const alertType = totalDiff > 0 ? 'CAUTION' : 'TIP';
                      const summaryLines = totalDiff === 0
                          ? ['> [!NOTE]', '> Bundle size unchanged']
                          : ['> [!' + alertType + ']', `> Bundle size ${verb} by ${totalSizeText}`];

                      const body = [
                          '<!-- bundle-size-report -->',
                          '## Bundle Size Report',
                          '',
                          ...summaryLines,
                          '',
                          `| | Entry | \`${baseRef}\` | This PR | Delta |`,
                          '|---|---|--:|--:|---|',
                          `| ${dot(pr.total, base.total)} | **Total** | ${fmt(base.total)} | ${fmt(pr.total)} | ${delta(pr.total, base.total)} |`,
                          ...rows,
                          '',
                          `<sub>Measured at ${sha}</sub>`,
                      ].join('\n');

                      const { data: comments } = await github.rest.issues.listComments({
                          owner: context.repo.owner,
                          repo: context.repo.repo,
                          issue_number: context.issue.number,
                      });

                      const existing = comments.find(c => c.body.includes('<!-- bundle-size-report -->'));
                      if (existing) {
                          await github.rest.issues.updateComment({
                              owner: context.repo.owner,
                              repo: context.repo.repo,
                              comment_id: existing.id,
                              body,
                          });
                      } else {
                          await github.rest.issues.createComment({
                              owner: context.repo.owner,
                              repo: context.repo.repo,
                              issue_number: context.issue.number,
                              body,
                          });
                      }
