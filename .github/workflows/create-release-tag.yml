name: Create Release Tag

on:
    push:
        branches:
            - main
        paths:
            - package.json

permissions:
    contents: write

jobs:
    create-release-tag:
        name: Create release tag
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v6
              with:
                  fetch-depth: 0

            - name: Check package version change
              id: version
              run: |
                  before_sha="${{ github.event.before }}"
                  current_version=$(node -p "require('./package.json').version")

                  if ! git cat-file -e "$before_sha:package.json" 2> /dev/null; then
                      echo "changed=false" >> "$GITHUB_OUTPUT"
                      echo "Could not read package.json from previous commit; skipping tag creation."
                      exit 0
                  fi

                  previous_version=$(git show "$before_sha:package.json" | node -p "JSON.parse(require('fs').readFileSync(0, 'utf8')).version")

                  echo "current=$current_version" >> "$GITHUB_OUTPUT"
                  echo "previous=$previous_version" >> "$GITHUB_OUTPUT"

                  if [ "$current_version" = "$previous_version" ]; then
                      echo "changed=false" >> "$GITHUB_OUTPUT"
                      echo "package.json version did not change; skipping tag creation."
                  else
                      echo "changed=true" >> "$GITHUB_OUTPUT"
                      echo "package.json version changed from $previous_version to $current_version."
                  fi

            - name: Check changelog
              if: steps.version.outputs.changed == 'true'
              run: npm run changelog:check

            - name: Check tag does not exist
              if: steps.version.outputs.changed == 'true'
              run: |
                  tag_name="v${{ steps.version.outputs.current }}"

                  if git ls-remote --exit-code --tags origin "refs/tags/$tag_name" > /dev/null 2>&1; then
                      echo "Tag $tag_name already exists."
                      exit 1
                  fi

            - name: Create release tag
              if: steps.version.outputs.changed == 'true'
              run: |
                  tag_name="v${{ steps.version.outputs.current }}"

                  git config user.name "github-actions[bot]"
                  git config user.email "github-actions[bot]@users.noreply.github.com"
                  git tag "$tag_name" -m "Release $tag_name"
                  git push origin "refs/tags/$tag_name"

            - uses: actions/setup-node@v6
              if: steps.version.outputs.changed == 'true'
              with:
                  node-version-file: package.json
                  cache: npm
                  registry-url: https://registry.npmjs.org/

            - name: Authenticate GitLab npm registry
              if: steps.version.outputs.changed == 'true'
              run: npm config set //gitlab.com/api/v4/projects/38958827/packages/npm/:_authToken ${{ secrets.GITLAB_NPM_TOKEN }}

            - name: Install dependencies
              if: steps.version.outputs.changed == 'true'
              run: npm ci
              env:
                  GITLAB_NPM_TOKEN: ${{ secrets.GITLAB_NPM_TOKEN }}

            - name: Publish to npm
              if: steps.version.outputs.changed == 'true'
              run: |
                  npm config delete --location project @solvimon:registry
                  npm publish
              env:
                  NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
                  NPM_TOKEN: ${{ secrets.NPM_TOKEN }}

            - name: Extract changelog section
              if: steps.version.outputs.changed == 'true'
              id: changelog
              run: |
                  version="${{ steps.version.outputs.current }}"
                  notes=$(awk -v ver="[$version]" '
                    /^## \[/ { if (found) exit; if (index($0, ver)) found=1; next }
                    found { print }
                  ' CHANGELOG.md)
                  echo "notes<<EOF" >> "$GITHUB_OUTPUT"
                  echo "$notes" >> "$GITHUB_OUTPUT"
                  echo "EOF" >> "$GITHUB_OUTPUT"

            - name: Create GitHub Release
              if: steps.version.outputs.changed == 'true'
              env:
                  GH_TOKEN: ${{ github.token }}
                  RELEASE_NOTES: ${{ steps.changelog.outputs.notes }}
              run: |
                  gh release create "v${{ steps.version.outputs.current }}" \
                    --title "v${{ steps.version.outputs.current }}" \
                    --notes "$RELEASE_NOTES" \
                    --verify-tag
