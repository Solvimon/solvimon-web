name: Auto Assign

on:
    pull_request:
        types: [opened]

jobs:
    add-assignee:
        runs-on: ubuntu-latest
        permissions:
            issues: write
            pull-requests: write

        steps:
            - uses: actions/github-script@v7
              with:
                  script: |
                      github.rest.issues.addAssignees({
                          owner: context.repo.owner,
                          repo: context.repo.repo,
                          issue_number: context.issue.number,
                          assignees: [context.actor]
                      })
