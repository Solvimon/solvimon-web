name: Release

on:
    push:
        tags:
            - 'v*'

jobs:
    release:
        name: Publish to npm
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4

            - uses: actions/setup-node@v4
              with:
                  node-version-file: package.json
                  cache: npm
                  registry-url: https://registry.npmjs.org/

            - name: Authenticate GitLab npm registry
              run: npm config set //gitlab.com/api/v4/projects/38958827/packages/npm/:_authToken ${{ secrets.GITLAB_NPM_TOKEN }}

            - name: Install dependencies
              run: npm ci
              env:
                  GITLAB_NPM_TOKEN: ${{ secrets.GITLAB_NPM_TOKEN }}

            - name: Unit tests
              run: npm run test:unit -- --run

            - name: Type check
              run: npm run type-check

            - name: Lint
              run: npm run lint:ci

            - name: Build
              run: npm run build

            - name: Check changelog
              run: npm run changelog:check

            - name: Publish to npm
              run: npm publish
              env:
                  NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
