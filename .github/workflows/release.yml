name: Release

on:
    push:
        tags:
            - 'v*'

jobs:
    release:
        name: Publish to npm
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4

            - uses: actions/setup-node@v4
              with:
                  node-version-file: package.json
                  cache: npm
                  registry-url: https://registry.npmjs.org/

            - name: Authenticate GitLab npm registry
              run: npm config set //gitlab.com/api/v4/projects/38958827/packages/npm/:_authToken ${{ secrets.GITLAB_NPM_TOKEN }}

            - name: Install dependencies
              run: npm ci
              env:
                  GITLAB_NPM_TOKEN: ${{ secrets.GITLAB_NPM_TOKEN }}

            - name: Verify tag matches package version
              run: |
                  package_version=$(node -p "require('./package.json').version")
                  tag_version="${GITHUB_REF_NAME#v}"

                  if [ "$package_version" != "$tag_version" ]; then
                      echo "Tag v$tag_version does not match package.json version $package_version."
                      exit 1
                  fi

            - name: Publish to npm
              run: npm publish
              env:
                  NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
