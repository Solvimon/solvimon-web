name: Release

on:
    push:
        tags:
            - 'v*'

permissions:
    contents: write

jobs:
    release:
        name: Publish to npm
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v6

            - uses: actions/setup-node@v6
              with:
                  node-version-file: package.json
                  cache: npm
                  registry-url: https://registry.npmjs.org/

            - name: Authenticate GitLab npm registry
              run: npm config set //gitlab.com/api/v4/projects/38958827/packages/npm/:_authToken ${{ secrets.GITLAB_NPM_TOKEN }}

            - name: Install dependencies
              run: npm ci
              env:
                  GITLAB_NPM_TOKEN: ${{ secrets.GITLAB_NPM_TOKEN }}

            - name: Verify tag matches package version
              run: |
                  package_version=$(node -p "require('./package.json').version")
                  tag_version="${GITHUB_REF_NAME#v}"

                  if [ "$package_version" != "$tag_version" ]; then
                      echo "Tag v$tag_version does not match package.json version $package_version."
                      exit 1
                  fi

            - name: Publish to npm
              run: |
                  npm config set @solvimon:registry https://registry.npmjs.org/
                  npm publish
              env:
                  NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
                  NPM_TOKEN: ${{ secrets.NPM_TOKEN }}

            - name: Extract changelog section
              id: changelog
              run: |
                  version="${GITHUB_REF_NAME#v}"
                  notes=$(awk -v ver="[$version]" '
                    /^## \[/ { if (found) exit; if (index($0, ver)) found=1; next }
                    found { print }
                  ' CHANGELOG.md)
                  echo "notes<<EOF" >> "$GITHUB_OUTPUT"
                  echo "$notes" >> "$GITHUB_OUTPUT"
                  echo "EOF" >> "$GITHUB_OUTPUT"

            - name: Create GitHub Release
              env:
                  GH_TOKEN: ${{ github.token }}
                  RELEASE_NOTES: ${{ steps.changelog.outputs.notes }}
              run: |
                  gh release create "$GITHUB_REF_NAME" \
                    --title "$GITHUB_REF_NAME" \
                    --notes "$RELEASE_NOTES" \
                    --verify-tag
