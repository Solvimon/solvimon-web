image: node:20

variables:
    npm_config_cache: '$CI_PROJECT_DIR/.npm'

# The root `.gitlab-ci.yml` now decides when this child pipeline should run.
# It does that based on file changes.
# But this child file still has to allow GitLab to start it.
# GitLab checks `workflow.rules` before creating the pipeline.
# `parent_pipeline` means this file was started by the root pipeline.
# The branch and tag rules keep this file working when pipelines are run directly,
# for example when a user triggers or reruns them manually.
workflow:
    rules:
        - if: '$CI_PIPELINE_SOURCE == "parent_pipeline"'
        - if: '$CI_COMMIT_TAG'
        - if: '$CI_COMMIT_BRANCH'

stages:
    - build
    - test
    - release
    - publish

cache:
    key:
        files:
            - package-lock.json
    paths:
        - .npm/
        - .cache/ms-playwright/
    policy: pull

build-and-test:
    stage: build
    timeout: 5m
    script:
        - npm ci --cache .npm --prefer-offline
        - npm run build -w packages/ui
        - npm run lint:ci -w packages/sdk
        - npm run type-check -w packages/sdk
        - npm run test:unit -w packages/sdk
        - npm run translations:extract -w packages/sdk
        - npm run translations:compile -w packages/sdk
        - npm run translations:check -w packages/sdk
        - npm run build -w packages/sdk
    artifacts:
        paths:
            - packages/ui/dist
            - packages/sdk/dist
        expire_in: 1 week

test:e2e:
    stage: test
    timeout: 15m
    dependencies:
        - build-and-test
    cache:
        key:
            files:
                - package-lock.json
        paths:
            - .npm/
            - .cache/ms-playwright/
        policy: pull-push
    before_script:
        - npm ci --cache .npm --prefer-offline
        - npx playwright install --with-deps chromium
        - npm run test:ssl:generate -w packages/sdk || true
    script:
        - echo "Skipping e2e tests"
          # - npm run test:e2e -w packages/sdk
    artifacts:
        when: always
        paths:
            - packages/sdk/tests/playwright/report/
            - packages/sdk/tests/playwright/test-results/
        reports:
            junit: packages/sdk/tests/playwright/results.xml
        expire_in: 1 week
    rules:
        - if: $CI_COMMIT_REF_NAME !~ /^release/ && $CI_COMMIT_REF_NAME !~ /^tag/

tag:sdk-release:
    stage: release
    timeout: 5m
    script:
        - |
          if [ "$CI_COMMIT_BRANCH" != "main" ]; then
              echo "Skipping SDK auto-tag outside main."
              exit 0
          fi

          if [ -n "$CI_COMMIT_TAG" ]; then
              echo "Skipping SDK auto-tag on tag pipelines."
              exit 0
          fi

          if [ "$CI_COMMIT_BEFORE_SHA" = "0000000000000000000000000000000000000000" ]; then
              echo "No previous commit SHA available, skipping SDK auto-tag."
              exit 0
          fi

          if ! git diff --name-only "$CI_COMMIT_BEFORE_SHA" "$CI_COMMIT_SHA" -- packages/sdk/package.json | grep -q .; then
              echo "packages/sdk/package.json did not change, skipping SDK auto-tag."
              exit 0
          fi

          VERSION="$(node -p "require('./packages/sdk/package.json').version")"
          TAG="sdk-v${VERSION}"

          git fetch --tags

          if git rev-parse "$TAG" >/dev/null 2>&1; then
              echo "Tag ${TAG} already exists, skipping."
              exit 0
          fi

          git config user.name "GitLab CI"
          git config user.email "gitlab-ci@solvimon.invalid"
          git tag "$TAG" "$CI_COMMIT_SHA"
          git push "https://gitlab-ci-token:${CI_JOB_TOKEN}@${CI_SERVER_HOST}/${CI_PROJECT_PATH}.git" "$TAG"
    rules:
        - if: '$CI_COMMIT_BRANCH == "main"'

publish:npm:
    stage: publish
    timeout: 10m
    cache:
        key:
            files:
                - package-lock.json
        paths:
            - .npm/
        policy: pull-push
    before_script:
        - npm ci --cache .npm --prefer-offline
        - npm run build -w packages/sdk
        - echo "@solvimon:registry=https://gitlab.com/api/v4/projects/${CI_PROJECT_ID}/packages/npm/" > .npmrc
        - echo "//gitlab.com/api/v4/projects/${CI_PROJECT_ID}/packages/npm/:_authToken=${CI_JOB_TOKEN}" >> .npmrc
        - echo "always-auth=true" >> .npmrc
    script:
        - npm publish -w packages/sdk --cache .npm --ignore-scripts
    rules:
        - if: '$CI_COMMIT_TAG =~ /^sdk-v\d+\.\d+\.\d+(-.+)?$/'
