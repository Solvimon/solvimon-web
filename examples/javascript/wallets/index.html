<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Solvimon SDK Wallet Balances Example</title>
        <script src="https://cdn.tailwindcss.com"></script>
    </head>

    <body class="bg-slate-100 text-slate-950 antialiased">
        <main class="min-h-screen p-4 sm:p-6 lg:p-10">
            <div
                class="mx-auto flex max-w-6xl flex-col gap-6 rounded-lg border border-slate-200 bg-white p-5 shadow-sm sm:p-6 lg:p-8"
            >
                <!-- HEADER -->
                <header
                    class="flex flex-col gap-3 border-b border-slate-200 pb-5 sm:flex-row sm:items-center sm:justify-between"
                >
                    <div>
                        <p class="text-xs font-semibold uppercase tracking-wide text-slate-500">
                            TEST environment
                        </p>
                        <h1 class="text-2xl font-semibold text-slate-950">Wallet balances</h1>
                    </div>

                    <a
                        href="https://test.desk.solvimon.com/"
                        target="_blank"
                        class="inline-flex h-10 items-center justify-center rounded-md border border-slate-300 px-4 text-sm font-medium text-slate-700 hover:bg-slate-50"
                    >
                        Open test desk
                    </a>
                </header>

                <div class="grid gap-6 lg:grid-cols-[minmax(0,1fr)_minmax(360px,0.9fr)]">
                    <!-- LEFT SIDE -->
                    <section class="flex flex-col">
                        <!-- summary skeleton -->
                        <div data-template-root="summary-skeleton-template"></div>

                        <!-- table skeleton -->
                        <div data-template-root="table-skeleton-template"></div>
                    </section>

                    <!-- RIGHT SIDE -->
                    <aside class="flex flex-col gap-5">
                        <!-- Wallet -->
                        <div>
                            <div id="wallet-root" class="rounded border p-4"></div>
                        </div>

                        <!-- actions skeleton -->
                        <div data-template-root="actions-skeleton-template"></div>
                    </aside>
                </div>
            </div>
        </main>

        <!-- ================= SCRIPT ================= -->

        <script type="module">
            import { createSolvimonCore } from '@solvimon/solvimon-web/core';
            import { CORE_CONFIG, customer } from './defaults.js';
            import { renderTemplates, injectTemplates } from './templates.js';

            injectTemplates();
            renderTemplates();

            const walletRoot = document.getElementById('wallet-root');

            if (!walletRoot) {
                throw new Error('Missing #wallet-root container');
            }

            const solvimon = createSolvimonCore(CORE_CONFIG);

            const unmount = solvimon.createComponent('wallet-balances', {
                container: walletRoot,
                portalObject: {
                    object_type: 'PORTAL_URL',
                    embedded: true,
                    token: customer.token,
                    url: 'https://test.desk.solvimon.com/',
                    customer_id: customer.customerId,
                },
            });

            window.addEventListener('beforeunload', () => {
                if (unmount === undefined) {
                    return;
                }
                unmount();
            });
        </script>
    </body>
</html>
